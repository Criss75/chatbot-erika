<!doctype html>
<html lang="ro">
  <head>
    <meta charset="UTF-8" />
    <title>Chat client</title>
    <style>
      body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        background: #f5f5f5;
        margin: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }

      .chat-container {
        background: white;
        width: 100%;
        max-width: 480px;
        height: 80vh;
        display: flex;
        flex-direction: column;
        border-radius: 16px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        overflow: hidden;
      }

      .chat-header {
        padding: 12px 16px;
        background: #ff8800;
        color: white;
        font-weight: 600;
      }

      .messages {
        flex: 1;
        padding: 12px;
        overflow-y: auto;
        font-size: 14px;
      }

      .message {
        margin-bottom: 8px;
        max-width: 80%;
        padding: 8px 10px;
        border-radius: 12px;
        line-height: 1.3;
        white-space: pre-wrap;
      }

      .message.user {
        margin-left: auto;
        background: #0078d4;
        color: white;
        border-bottom-right-radius: 2px;
      }

      .message.bot {
        margin-right: auto;
        background: #f0f0f0;
        border-bottom-left-radius: 2px;
      }

      .chat-input {
        display: flex;
        padding: 8px;
        border-top: 1px solid #ddd;
        gap: 8px;
      }

      .chat-input input {
        flex: 1;
        padding: 8px 10px;
        border-radius: 999px;
        border: 1px solid #ccc;
        font-size: 14px;
      }

      .chat-input button {
        padding: 8px 14px;
        border-radius: 999px;
        border: none;
        background: #ff8800;
        color: white;
        font-weight: 600;
        cursor: pointer;
      }

      .chat-input button:disabled {
        opacity: 0.6;
        cursor: default;
      }

      .error {
        padding: 12px;
        color: #b00020;
        font-size: 14px;
        text-align: center;
      }

      /* FAQ buttons */

      .faq-buttons {
        padding: 0 12px 8px 12px;
      }

      .faq-button {
        display: inline-block;
        margin: 4px 4px 0 0;
        padding: 6px 10px;
        font-size: 12px;
        border-radius: 999px;
        border: 1px solid #ddd;
        background: #f7f7f7;
        cursor: pointer;
      }

      .faq-button:hover {
        background: #eee;
      }
    </style>
  </head>
  <body>
    <div class="chat-container">
      <div id="chat-header" class="chat-header">Chatbot client</div>
      <div id="messages" class="messages"></div>

      <!-- nou: container pentru FAQ buttons -->
      <div id="faq-buttons" class="faq-buttons" style="display: none"></div>

      <div id="error" class="error" style="display: none"></div>
      <form id="chat-form" class="chat-input">
        <input
          id="message-input"
          type="text"
          placeholder="Scrie un mesaj..."
          autocomplete="off"
        />
        <button type="submit">Trimite</button>
      </form>
    </div>

    <script>
      const params = new URLSearchParams(window.location.search);
      const CLIENT_ID = params.get("clientId");

      const headerEl = document.getElementById("chat-header");
      const messagesEl = document.getElementById("messages");
      const errorEl = document.getElementById("error");
      const form = document.getElementById("chat-form");
      const input = document.getElementById("message-input");
      const button = form.querySelector("button");
      const faqContainer = document.getElementById("faq-buttons");

      function showError(msg) {
        errorEl.textContent = msg;
        errorEl.style.display = "block";
      }

      function addMessage(text, type) {
        const div = document.createElement("div");
        div.className = "message " + type;
        div.textContent = text;
        messagesEl.appendChild(div);
        messagesEl.scrollTop = messagesEl.scrollHeight;
      }

      async function loadClient() {
        if (!CLIENT_ID) {
          showError(
            "Lipsește parametru ?clientId= din URL. Exemplu: /chat.html?clientId=example-client"
          );
          form.style.display = "none";
          return;
        }

        try {
          const res = await fetch(`/api/clients/${CLIENT_ID}`);
          if (!res.ok) {
            showError(
              "Nu am găsit clientul " +
                CLIENT_ID +
                ". Verifică numele sau config-ul."
            );
            form.style.display = "none";
            return;
          }

          const config = await res.json();

          headerEl.textContent = `${config.name} – Chatbot`;
          if (config.brandColor) {
            headerEl.style.backgroundColor = config.brandColor;
          }

          const opening =
            config.openingMessage ||
            "Bună! Sunt chatbot-ul nostru. Cu ce te pot ajuta?";
          addMessage(opening, "bot");

          // --- nou: FAQ buttons din config.faqButtons ---
          if (Array.isArray(config.faqButtons) && config.faqButtons.length > 0) {
            faqContainer.innerHTML = "";
            config.faqButtons.forEach((text) => {
              const btn = document.createElement("button");
              btn.type = "button";
              btn.className = "faq-button";
              btn.textContent = text;
              btn.onclick = () => {
                sendMessage(text); // trimitem întrebarea ca mesaj al userului
              };
              faqContainer.appendChild(btn);
            });
            faqContainer.style.display = "block";
          } else {
            faqContainer.style.display = "none";
          }
        } catch (e) {
          console.error(e);
          showError("Eroare la încărcarea datelor clientului.");
        }
      }

      async function sendMessage(message) {
        addMessage(message, "user");
        input.value = "";
        input.focus();
        button.disabled = true;

        try {
          const res = await fetch(`/api/chat/${CLIENT_ID}`, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({ message }),
          });

          if (!res.ok) {
            const err = await res.json().catch(() => ({}));
            addMessage(
              "Eroare de la server: " +
                (err.error || res.status + " " + res.statusText),
              "bot"
            );
          } else {
            const data = await res.json();
            addMessage(data.reply, "bot");
          }
        } catch (e) {
          addMessage("Eroare de rețea. Încearcă din nou.", "bot");
        } finally {
          button.disabled = false;
        }
      }

      form.addEventListener("submit", (e) => {
        e.preventDefault();
        const text = input.value.trim();
        if (!text || !CLIENT_ID) return;
        sendMessage(text);
      });

      loadClient();
    </script>
  </body>
</html>
