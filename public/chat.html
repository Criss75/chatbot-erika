<!DOCTYPE html>
<html lang="ro">
  <head>
    <meta charset="UTF-8" />
    <title>Chatbot Agency</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app-bg">
      <div class="blob blob-1"></div>
      <div class="blob blob-2"></div>
      <div class="blob blob-3"></div>
    </div>

    <div class="chat-wrapper">
      <div class="chat-container">

        <!-- HEADER -->
        <header class="chat-header">
          <div class="header-left">
            <div class="avatar" id="client-avatar">
              <svg id="avatar-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="26" height="26" fill="none">
                <rect x="12" y="20" width="40" height="30" rx="8" fill="white" fill-opacity="0.92"/>
                <rect x="20" y="30" width="8" height="8" rx="2" fill="currentColor"/>
                <rect x="36" y="30" width="8" height="8" rx="2" fill="currentColor"/>
                <rect x="24" y="42" width="16" height="3" rx="1.5" fill="currentColor"/>
                <rect x="28" y="10" width="8" height="10" rx="4" fill="white" fill-opacity="0.92"/>
                <circle cx="32" cy="10" r="3" fill="white" fill-opacity="0.92"/>
                <rect x="8" y="28" width="4" height="10" rx="2" fill="white" fill-opacity="0.7"/>
                <rect x="52" y="28" width="4" height="10" rx="2" fill="white" fill-opacity="0.7"/>
              </svg>
            </div>
            <div class="header-info">
              <h1 id="chat-title">Evrika, Asistent Virtual</h1>
              <span class="status-dot-row">
                <span class="status-dot"></span>
                <span class="status-text">Online now &bull; 24/7 support</span>
              </span>
            </div>
          </div>
          <div class="header-right">
            <select id="client-select"></select>
          </div>
        </header>

        <!-- CHAT WINDOW -->
        <div id="chat-window" class="chat-window">
          <div class="chat-date-divider"><span>Today</span></div>
        </div>

        <!-- INPUT -->
        <div class="chat-input-area">
          <form id="chat-form" class="chat-input-row">
            <input
              id="chat-input"
              type="text"
              placeholder="Write a message..."
              autocomplete="off"
            />
            <button type="submit" id="send-btn">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <line x1="22" y1="2" x2="11" y2="13"></line>
                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
              </svg>
            </button>
          </form>
          <p class="powered-by">Powered by <strong>JX Automations</strong></p>
        </div>

      </div>
    </div>

    <script src="chat.js"></script>
  </body>
</html>
