<!doctype html>
<html lang="ro">
  <head>
    <meta charset="UTF-8" />
    <title>Demo widget chat</title>
    <style>
      body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        margin: 0;
        background: #f5f5f5;
      }

      header {
        padding: 16px 24px;
        background: white;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.05);
        position: sticky;
        top: 0;
        z-index: 10;
      }

      main {
        padding: 24px;
        max-width: 960px;
        margin: 0 auto;
      }

      .product-card {
        background: white;
        padding: 24px;
        border-radius: 16px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.05);
        max-width: 360px;
      }

      .product-name {
        font-size: 20px;
        font-weight: 600;
        margin-bottom: 8px;
      }

      .product-price {
        font-size: 18px;
        font-weight: 600;
        margin-top: 8px;
      }

      .product-desc {
        font-size: 14px;
        color: #555;
      }

      /* BUTON PLUTITOR CHAT */

      #chat-widget-button {
        position: fixed;
        bottom: 20px;
        right: 20px;
        background: black;
        color: white;
        border-radius: 999px;
        padding: 10px 16px;
        display: flex;
        align-items: center;
        gap: 8px;
        cursor: pointer;
        font-size: 14px;
        z-index: 9999;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.25);
      }

      #chat-widget-button span.icon {
        font-size: 18px;
      }

      #chat-widget-iframe {
        position: fixed;
        bottom: 80px;
        right: 20px;
        width: 380px;
        height: 520px;
        border: none;
        border-radius: 16px;
        box-shadow: 0 12px 32px rgba(0, 0, 0, 0.3);
        display: none; /* ascuns la început */
        z-index: 9999;
        overflow: hidden;
      }
    </style>
  </head>
  <body>
    <header>
      <strong>Demo site client</strong> – așa va arăta chat-ul pe site-ul tău
    </header>

    <main>
      <h2>Pagină demo</h2>
      <p>
        Aici poți simula conținutul site-ului clientului (produs, servicii,
        text de prezentare etc.).
      </p>

      <div class="product-card">
        <div class="product-name">Bella Bowl Small Champagne, 1.0 CT</div>
        <div class="product-desc">
          Bol elegant pentru animale de companie, perfect pentru câini de talie
          mică și pisici.
        </div>
        <div class="product-price">$19.99</div>
      </div>
    </main>

    <!-- BUTONUL PLUTITOR DE CHAT -->
    <div id="chat-widget-button" onclick="toggleChat()">
      <span class="icon">💬</span>
      <span>Chat</span>
    </div>

    <!-- FEREASTRA DE CHAT ÎN IFRAME -->
    <iframe id="chat-widget-iframe"></iframe>

    <script>
      // luăm clientId din URL, ex: /widget-demo.html?clientId=petjungle
      const params = new URLSearchParams(window.location.search);
      const clientId = params.get("clientId") || "example-client";

      const iframe = document.getElementById("chat-widget-iframe");
      iframe.src = "/chat.html?clientId=" + encodeURIComponent(clientId);

      function toggleChat() {
        const isHidden =
          iframe.style.display === "none" || iframe.style.display === "";
        iframe.style.display = isHidden ? "block" : "none";
      }
    </script>
  </body>
</html>
