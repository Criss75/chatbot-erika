<!doctype html>
<html lang="ro">
  <head>
    <meta charset="UTF-8" />
    <title>Chat - Example Pet Shop</title>
    <style>
      body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        background: #f5f5f5;
        margin: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }

      .chat-container {
        background: white;
        width: 100%;
        max-width: 480px;
        height: 80vh;
        display: flex;
        flex-direction: column;
        border-radius: 16px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        overflow: hidden;
      }

      .chat-header {
        padding: 12px 16px;
        background: #ff8800;
        color: white;
        font-weight: 600;
      }

      .messages {
        flex: 1;
        padding: 12px;
        overflow-y: auto;
        font-size: 14px;
      }

      .message {
        margin-bottom: 8px;
        max-width: 80%;
        padding: 8px 10px;
        border-radius: 12px;
        line-height: 1.3;
        white-space: pre-wrap;
      }

      .message.user {
        margin-left: auto;
        background: #0078d4;
        color: white;
        border-bottom-right-radius: 2px;
      }

      .message.bot {
        margin-right: auto;
        background: #f0f0f0;
        border-bottom-left-radius: 2px;
      }

      .chat-input {
        display: flex;
        padding: 8px;
        border-top: 1px solid #ddd;
        gap: 8px;
      }

      .chat-input input {
        flex: 1;
        padding: 8px 10px;
        border-radius: 999px;
        border: 1px solid #ccc;
        font-size: 14px;
      }

      .chat-input button {
        padding: 8px 14px;
        border-radius: 999px;
        border: none;
        background: #ff8800;
        color: white;
        font-weight: 600;
        cursor: pointer;
      }

      .chat-input button:disabled {
        opacity: 0.6;
        cursor: default;
      }
    </style>
  </head>
  <body>
    <div class="chat-container">
      <div class="chat-header">Example Pet Shop – Chatbot</div>
      <div id="messages" class="messages"></div>
      <form id="chat-form" class="chat-input">
        <input
          id="message-input"
          type="text"
          placeholder="Scrie un mesaj..."
          autocomplete="off"
        />
        <button type="submit">Trimite</button>
      </form>
    </div>

    <script>
      const CLIENT_ID = "example-client";
      const messagesEl = document.getElementById("messages");
      const form = document.getElementById("chat-form");
      const input = document.getElementById("message-input");
      const button = form.querySelector("button");

      function addMessage(text, type) {
        const div = document.createElement("div");
        div.className = "message " + type;
        div.textContent = text;
        messagesEl.appendChild(div);
        messagesEl.scrollTop = messagesEl.scrollHeight;
      }

      async function sendMessage(message) {
        addMessage(message, "user");
        input.value = "";
        input.focus();
        button.disabled = true;

        try {
          const res = await fetch(`/api/chat/${CLIENT_ID}`, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({ message }),
          });

          if (!res.ok) {
            const err = await res.json().catch(() => ({}));
            addMessage(
              "Eroare de la server: " +
                (err.error || res.status + " " + res.statusText),
              "bot"
            );
          } else {
            const data = await res.json();
            addMessage(data.reply, "bot");
          }
        } catch (e) {
          addMessage("Eroare de rețea. Încearcă din nou.", "bot");
        } finally {
          button.disabled = false;
        }
      }

      form.addEventListener("submit", (e) => {
        e.preventDefault();
        const text = input.value.trim();
        if (!text) return;
        sendMessage(text);
      });

      // mesaj de întâmpinare
      addMessage(
        "Bună! Sunt chatbot-ul Example Pet Shop. Cu ce te pot ajuta?",
        "bot"
      );
    </script>
  </body>
</html>
