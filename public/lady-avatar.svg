  <!-- Face -->
  <ellipse cx="60" cy="55" rx="24" ry="28" fill="#F4C4A0" />
  
  <!-- Neck -->
  <rect x="50" y="76" width="20" height="12" fill="#F4C4A0" />
  
  <!-- Eyes -->
  <ellipse cx="48" cy="49" rx="5" ry="7" fill="#5B8BB8" />
  <ellipse cx="72" cy="49" rx="5" ry="7" fill="#5B8BB8" />
  
  <!-- Eye highlights -->
